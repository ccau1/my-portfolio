# =============================================================================
# CONFIG — Edit these values when copying to another repo
# =============================================================================
# Branch:     main
# Domain:     staging.tribalorigin.com
# Server dir: /opt/tribaloriginlanding-staging
# =============================================================================

name: Build & Deploy to Staging

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/src/**'
      - 'packages/web/public/**'
      - 'packages/web/index.html'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:staging
            ${{ env.IMAGE_BASE }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write staging .env
        run: |
          mkdir -p deploy
          cat > deploy/.env <<EOF
          DOMAIN_STAGING=staging.tribalorigin.com
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Copy compose & nginx to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HETZNER_HOST }}
          username: ${{ secrets.STAGING_HETZNER_USER }}
          key: ${{ secrets.STAGING_HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.staging.yml,deploy/.env,deploy/nginx.dev.conf"
          target: "/opt/tribaloriginlanding-staging"
          strip_components: 1

      - name: Deploy on staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HETZNER_HOST }}
          username: ${{ secrets.STAGING_HETZNER_USER }}
          key: ${{ secrets.STAGING_HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/tribaloriginlanding-staging

            # Authenticate to GHCR so the server can pull private images
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set image reference and pull latest staging image
            export APP_IMAGE="${{ env.IMAGE_BASE }}:staging"
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d

            # Prune old dangling images to save disk
            docker image prune -af
            docker system prune -f

      - name: Health check (staging)
        run: |
          HEALTH_URL="https://staging.tribalorigin.com"
          echo "Testing staging site: $HEALTH_URL"
          echo "Waiting for containers to start..."
          for i in {1..12}; do
            sleep 5
            echo "Attempt $i/12: curl -sf $HEALTH_URL"
            if curl -sf "$HEALTH_URL"; then
              echo "Staging health check passed: $HEALTH_URL"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying..."
          done
          echo "Staging health check failed after 60 seconds: $HEALTH_URL"
          exit 1
