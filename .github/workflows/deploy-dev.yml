# =============================================================================
# CONFIG — Edit these values when copying to another repo
# =============================================================================
# Branch:     develop
# Domain:     portfolio.dev.tribalorigin.com
# Server dir: /opt/my-portfolio-dev
# =============================================================================

name: Build & Deploy to Dev

on:
  push:
    branches: [develop]
    paths:
      - 'packages/web/src/**'
      - 'packages/web/public/**'
      - 'packages/web/index.html'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'deploy/**'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}
  BRANCH: develop
  DOMAIN_DEV: portfolio.dev.tribalorigin.com
  SERVER_DIR_DEV: /opt/my-portfolio-dev
  HEALTH_URL_DEV: https://portfolio.dev.tribalorigin.com
  IMAGE_TAG_DEV: dev
  IMAGE_TAG_DEV_SHA: dev-${{ github.sha }}
  COMPOSE_FILE_DEV: docker-compose.dev.yml
  NGINX_FILE_DEV: nginx.dev.conf

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build & push dev image
        uses: ./.github/actions/build-and-push-image
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_TAG_DEV }}
            ${{ env.IMAGE_TAG_DEV_SHA }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to dev server
        uses: ./.github/actions/deploy-to-hetzner
        with:
          host: ${{ secrets.DEV_HETZNER_HOST }}
          username: ${{ secrets.DEV_HETZNER_USER }}
          ssh-key: ${{ secrets.DEV_HETZNER_SSH_KEY }}
          remote-path: ${{ env.SERVER_DIR_DEV }}
          compose-file: ${{ env.COMPOSE_FILE_DEV }}
          files-to-copy: |
            deploy/${{ env.COMPOSE_FILE_DEV }}
            deploy/.env
            deploy/${{ env.NGINX_FILE_DEV }}
          env-file-header: |
            DOMAIN_DEV=${{ env.DOMAIN_DEV }}
            APP_IMAGE=${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG_DEV }}
          env-file-content: ${{ secrets.ENV_FILE }}
          protected-env-keys: APP_IMAGE,DOMAIN_,HEALTH_URL
          runtime-env-vars: APP_IMAGE=${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG_DEV }}
          ghcr-token: ${{ secrets.GH_TOKEN }}
          health-check-url: ${{ env.HEALTH_URL_DEV }}
