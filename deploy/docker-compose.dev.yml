# =============================================================================
# NOTE: Edit DOMAIN_DEV in deploy/.env if copying to another repo
# =============================================================================
version: "3.9"

services:
  app:
    image: ${APP_IMAGE}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-dev.rule=Host(`${DOMAIN_DEV}`)"
      - "traefik.http.routers.app-dev.entrypoints=websecure"
      - "traefik.http.routers.app-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.app-dev.loadbalancer.server.port=80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dev
    restart: unless-stopped

networks:
  dev:
    external: true
