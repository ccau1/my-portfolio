# =============================================================================
# NOTE: Edit DOMAIN_STAGING in deploy/.env if copying to another repo
# =============================================================================
version: "3.9"

services:
  app:
    image: ${APP_IMAGE}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-staging.rule=Host(`${DOMAIN_STAGING}`)"
      - "traefik.http.routers.app-staging.entrypoints=websecure"
      - "traefik.http.routers.app-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.app-staging.loadbalancer.server.port=80"
      - "traefik.http.middlewares.redirect-to-my-portfolio-staging.redirectregex.regex=^https?://[^/]+/(.*)"
      - "traefik.http.middlewares.redirect-to-my-portfolio-staging.redirectregex.replacement=https://portfolio.staging.tribalorigin.com/$${1}"
      - "traefik.http.middlewares.redirect-to-my-portfolio-staging.redirectregex.permanent=true"
      - "traefik.http.routers.app-staging-redirect.rule=Host(`staging.tribalorigin.com`)"
      - "traefik.http.routers.app-staging-redirect.entrypoints=websecure"
      - "traefik.http.routers.app-staging-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-staging-redirect.middlewares=redirect-to-my-portfolio-staging"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - staging
    restart: unless-stopped

networks:
  staging:
    external: true
